server {
    listen 80;
    server_name yourdomain.com; # Replace with your actual domain or IP

    # Redirect all HTTP traffic to HTTPS (highly recommended for production)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:9500;
        proxy_http_version 1.1;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' https: http: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:;" always;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (in case terminal or other systems use it)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffer adjustments
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }
}

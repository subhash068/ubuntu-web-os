name: CI/CD Deployment Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-node-version: '3.11'

    - name: Python Syntax and Lint Check
      run: |
        python -m py_compile server.py

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and Validate Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: ubuntu-webos:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
